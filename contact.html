<main>

<section class="section contact">
  <div class="container container-narrow">
    <p class="section-eyebrow">CONTACT</p>
    <h2 class="section-title">お問い合わせ</h2>
    <p class="section-lead">ご意見・ご感想・不具合報告など、お気軽にどうぞ。</p>

    <!-- Googleフォーム連携: 見た目はこのサイトのまま、送信データだけGoogleフォームに記録される -->
    <form class="contact-form" id="contactForm"
          action="https://docs.google.com/forms/d/e/1FAIpQLSd2zEGayqavc96Z0F9NjpJHDblPqJxu7sWBeWed3k_uHK79kQ/formResponse"
          method="POST" target="hidden_iframe">
      <div class="form-group">
        <label for="name">お名前 <span class="required">必須</span></label>
        <input type="text" id="name" name="entry.1781500597" required autocomplete="name">
      </div>
      <div class="form-group">
        <label for="email">メールアドレス <span class="required">必須</span></label>
        <input type="email" id="email" name="entry.1640447617" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="subject">件名</label>
        <input type="text" id="subject" name="entry.372180179">
      </div>
      <div class="form-group">
        <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
        <textarea id="message" name="entry.2040870261" rows="6" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-lg">送信する</button>
      <p class="form-success" id="formSuccess" hidden>送信しました。お問い合わせありがとうございます！</p>
    </form>
    <!-- Googleフォームの完了画面へ遷移させないための受け皿 -->
    <iframe name="hidden_iframe" id="hiddenIframe" style="display:none" title="送信処理用"></iframe>

    <div class="section-more"><a href="index.html" class="btn btn-outline btn-sm">← ホームに戻る</a></div>

<script>
// Googleフォーム送信: 完了画面に飛ばさず、その場で送信完了メッセージを表示する
(function () {
  const form = document.getElementById('contactForm');
  const iframe = document.getElementById('hiddenIframe');
  const success = document.getElementById('formSuccess');
  let submitted = false;

  form.addEventListener('submit', function () {
    submitted = true;
  });
  iframe.addEventListener('load', function () {
    if (!submitted) return; // 初期ロードは無視
    submitted = false;
    form.reset();
    success.hidden = false;
  });
})();
</script>
